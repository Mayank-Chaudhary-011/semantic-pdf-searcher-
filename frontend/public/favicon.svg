<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1A1714"/>

  <!-- Open book left page -->
  <path d="M10 18 C10 18 20 16 32 18 L32 48 C32 48 20 46 10 48 Z"
        fill="#C4830A" opacity="0.9"/>
  <!-- Open book right page -->
  <path d="M54 18 C54 18 44 16 32 18 L32 48 C32 48 44 46 54 48 Z"
        fill="#E89C2A" opacity="0.85"/>

  <!-- Book spine center line -->
  <line x1="32" y1="18" x2="32" y2="48" stroke="#1A1714" stroke-width="1.5"/>

  <!-- Left page lines (text suggestion) -->
  <line x1="15" y1="26" x2="28" y2="25" stroke="#FEF3DC" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="15" y1="31" x2="28" y2="30" stroke="#FEF3DC" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="15" y1="36" x2="24" y2="35.5" stroke="#FEF3DC" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Right page lines -->
  <line x1="36" y1="25" x2="49" y2="26" stroke="#1A1714" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <line x1="36" y1="30" x2="49" y2="31" stroke="#1A1714" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <line x1="36" y1="35.5" x2="46" y2="36" stroke="#1A1714" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Magnifying glass circle -->
  <circle cx="41" cy="38" r="9" fill="#1A1714" stroke="#F5F0E8" stroke-width="2.5"/>
  <circle cx="41" cy="38" r="6" fill="none" stroke="#C4830A" stroke-width="2"/>

  <!-- Magnifying glass handle -->
  <line x1="47.2" y1="44.2" x2="52" y2="49.5" stroke="#F5F0E8" stroke-width="2.8" stroke-linecap="round"/>

  <!-- AI sparkle top-right -->
  <path d="M50 12 L51.2 15 L54 16 L51.2 17 L50 20 L48.8 17 L46 16 L48.8 15 Z"
        fill="#FEF3DC" opacity="0.9"/>
  <!-- Small sparkle -->
  <path d="M56 8 L56.7 10 L58.5 10.5 L56.7 11 L56 13 L55.3 11 L53.5 10.5 L55.3 10 Z"
        fill="#C4830A" opacity="0.7"/>
</svg>